<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Internal Transfer - Hygiene Service</title>
<style>*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:16px;padding-bottom:40px;background:#e4f2fc;color:#111;}
header{background:#0d5a96;border-bottom:3px solid #1a7fc4;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
header img{height:52px;width:52px;object-fit:contain;border-radius:50%;background:#fff;padding:2px;flex-shrink:0;}
header h1{font-size:15px;font-weight:700;color:#ffffff;margin:0;}
header small{font-size:11px;color:rgba(255,255,255,0.78);display:block;margin-top:2px;}
.wrap{padding:14px;display:flex;flex-direction:column;gap:12px;max-width:600px;margin:0 auto;}
.card{background:#fff;border:1px solid #b8d8f0;border-radius:14px;overflow:hidden;}
.ch{background:#e4f2fc;border-bottom:1px solid #b8d8f0;padding:10px 16px;display:flex;align-items:center;gap:8px;}
.cht{font-size:11px;font-weight:700;color:#2a5a8a;text-transform:uppercase;letter-spacing:.07em;}
.cb{padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-size:13px;font-weight:500;color:#2a5a8a;}
input[type=text]{width:100%;padding:12px 14px;border:1.5px solid #b8d8f0;border-radius:9px;font-size:16px;font-family:inherit;color:#111;background:#fff;outline:none;-webkit-appearance:none;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tog{display:flex;gap:8px;}
.tb{flex:1;padding:12px 8px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;background:#fff;border:1.5px solid #b8d8f0;color:#2a5a8a;cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.tb.on{background:#e4f2fc;border-color:#1a7fc4;color:#0d5a96;}
#items{display:flex;flex-direction:column;gap:8px;}
.ib{background:#e4f2fc;border:1px solid #b8d8f0;border-radius:9px;padding:36px 12px 12px;position:relative;}
.ibn{font-size:11px;font-weight:700;color:#0d5a96;text-transform:uppercase;position:absolute;top:10px;left:12px;}
.ibx{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.1);border-radius:50%;width:28px;height:28px;font-size:14px;color:#555;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none;}
.addbtn{width:100%;padding:13px;background:none;border:1.5px dashed #1a7fc4;border-radius:9px;color:#0d5a96;font-size:15px;font-weight:700;cursor:pointer;display:block;text-align:center;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.genbtn{width:100%;padding:15px;background:#0d5a96;color:#fff;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;display:block;text-align:center;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.oc{display:none;background:#edf6ff;border-radius:14px;border:2px solid #1a7fc4;overflow:hidden;}
.olb{background:#0d5a96;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a5a8a;}
.olb img{height:40px;width:40px;object-fit:contain;border-radius:50%;background:#fff;padding:2px;}
.olb span{font-size:13px;font-weight:700;color:#ffffff;}
.oh{background:#0d5a96;padding:8px 16px 10px;font-size:12px;color:#ffffff;border-bottom:1px solid #1a5a8a;opacity:.85;}
.ot{padding:14px 16px;font-size:14px;line-height:1.85;white-space:pre-wrap;word-break:break-word;color:#111;}
.cpbtn{width:100%;padding:14px;background:#0d5a96;color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:block;text-align:center;touch-action:manipulation;}
.rsbtn{width:100%;padding:13px;background:#fff;border:1.5px solid #b8d8f0;border-radius:14px;color:#2a5a8a;font-size:15px;cursor:pointer;display:block;text-align:center;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#111;color:#fff;padding:10px 22px;border-radius:999px;font-size:14px;transition:transform .25s;z-index:9999;pointer-events:none;}</style>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</head>

<div class="toast" id="toast">✅ დაკოპირდა!</div>
<script>(function(){
var ic=0;
var SK="საქონელი",DZ="ძირითადი საშუალება",S="შიდა გადაადგილება";
var MG="მძღოლი: ",GN="განმცხადებლელი: ";
var PZ="პოზიცია ",DS="საქონლის დასახელება";
var AR="არტიკული",RA="რაოდენობა",APH="არტიკული კოდი",RPH="რაოდ. და ზომის ერთ.";

function g(id){return document.getElementById(id);}

function setType(n){
  g("ot").value=n;
  g("bS").className=n===0?"tb on":"tb";
  g("bD").className=n===1?"tb on":"tb";
}

function addItem(){
  ic++;
  var n=ic,d=document.createElement("div");
  d.className="ib";d.id="ii"+n;
  d.innerHTML="<span class=\"ibn\">"+PZ+n+"</span>"
    +"<div class=\"ibx\" data-id=\"ii"+n+"\">&#215;</div>"
    +"<div class=\"f\" style=\"margin-bottom:8px\"><label>"+DS+"</label>"
    +"<input type=\"text\" class=\"nm\" placeholder=\""+DS+"\"></div>"
    +"<div class=\"r2\">"
    +"<div class=\"f\"><label>"+AR+"</label><input type=\"text\" class=\"sk\" placeholder=\""+APH+"\"></div>"
    +"<div class=\"f\"><label>"+RA+"</label><input type=\"text\" class=\"qt\" placeholder=\""+RPH+"\"></div>"
    +"</div>";
  g("items").appendChild(d);
}

function generate(){
  var fr=g("fr").value.trim(),to=g("to").value.trim();
  var car=g("car").value.trim(),drv=g("drv").value.trim(),rep=g("rep").value.trim();
  var typ=parseInt(g("ot").value)===0?SK:DZ;
  var co=g("co_s").textContent;
  var now=new Date();
  var ds=now.toLocaleDateString("ka-GE",{year:"numeric",month:"long",day:"numeric"});
  var ts=now.toLocaleTimeString("ka-GE",{hour:"2-digit",minute:"2-digit"});
  var sep="─────────────────────";
  var t=S+"\n"+co+"\n"+sep+"\n";
  t+="🗓 "+ds+" "+ts+"\n";
  t+="📂 "+typ+"\n";
  if(fr||to) t+="🏁 "+(fr||"-")+" ➡ "+(to||"-")+"\n";
  if(car) t+="🚚 "+car+"\n";
  if(drv) t+="👤 "+MG+drv+"\n";
  if(rep) t+="✅ "+GN+rep+"\n";
  var rows=g("items").getElementsByClassName("ib");
  var hasIt=false;
  for(var i=0;i<rows.length;i++){
    var nm=rows[i].getElementsByClassName("nm")[0].value.trim();
    var sk=rows[i].getElementsByClassName("sk")[0].value.trim();
    var qt=rows[i].getElementsByClassName("qt")[0].value.trim();
    if(nm){
      if(!hasIt){t+=sep+"\n";hasIt=true;}
      var l=(i+1)+". "+nm;
      if(sk) l+=" ["+sk+"]";
      if(qt) l+=" — "+qt;
      t+=l+"\n";
    }
  }
  g("otxt").textContent=t;
  g("oc").style.display="block";
  setTimeout(function(){g("oc").scrollIntoView({behavior:"smooth",block:"start"});},80);
}

function copyText(){
  var txt=g("otxt").textContent;
  function ok(){
    var t=g("toast");
    t.style.transform="translateX(-50%) translateY(0)";
    setTimeout(function(){t.style.transform="translateX(-50%) translateY(80px)";},2000);
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok).catch(function(){fb(txt,ok);});
  }else{fb(txt,ok);}
}

function fb(txt,cb){
  var ta=document.createElement("textarea");
  ta.value=txt;ta.style.cssText="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");if(cb)cb();}catch(e){}
  document.body.removeChild(ta);
}

function reset(){
  ["fr","to","car","drv","rep"].forEach(function(id){g(id).value="";});
  g("items").innerHTML="";ic=0;setType(0);
  g("oc").style.display="none";
  window.scrollTo({top:0,behavior:"smooth"});
  addItem();
}

document.addEventListener("click",function(e){
  var el=e.target;
  for(var i=0;i<4;i++){
    if(!el||el===document.body) break;
    var id=el.id,did=el.getAttribute?el.getAttribute("data-id"):null;
    if(id==="bS"){setType(0);return;}
    if(id==="bD"){setType(1);return;}
    if(id==="addBtn"){addItem();return;}
    if(id==="genBtn"){generate();return;}
    if(id==="copyBtn"){copyText();return;}
    if(id==="resetBtn"){reset();return;}
    if(did){var t=g(did);if(t)t.parentNode.removeChild(t);return;}
    el=el.parentNode;
  }
},true);

addItem();
})();</script>
