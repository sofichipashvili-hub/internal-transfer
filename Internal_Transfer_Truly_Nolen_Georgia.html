CiiigAooooAKKKKACiiigAooooA//Z" alt=""><span>Truly Nolen Georgia — შიდა გადაადგილება</span></div><div class="oh">✅ მზადაა — ჩასვი WhatsApp-ში</div><div class="ot" id="otxt"></div><div class="cpbtn" id="copyBtn">📋 კოპირება</div></div>
<div class="rsbtn" id="resetBtn">🔄 გასუფთავება</div>
</div>
<div class="toast" id="toast">✅ დაკოპირდა!</div>
<script>(function(){
var ic=0;
var SK="საქონელი",DZ="ძირითადი საშუალება",S="შიდა გადაადგილება";
var MG="მძღოლი: ",GN="განმცხადებლელი: ";
var PZ="პოზიცია ",DS="საქონლის დასახელება";
var AR="არტიკული",RA="რაოდენობა",APH="არტიკული კოდი",RPH="რაოდ. და ზომის ერთ.";

function g(id){return document.getElementById(id);}

function setType(n){
  g("ot").value=n;
  g("bS").className=n===0?"tb on":"tb";
  g("bD").className=n===1?"tb on":"tb";
}

function addItem(){
  ic++;
  var n=ic,d=document.createElement("div");
  d.className="ib";d.id="ii"+n;
  d.innerHTML="<span class=\"ibn\">"+PZ+n+"</span>"
    +"<div class=\"ibx\" data-id=\"ii"+n+"\">&#215;</div>"
    +"<div class=\"f\" style=\"margin-bottom:8px\"><label>"+DS+"</label>"
    +"<input type=\"text\" class=\"nm\" placeholder=\""+DS+"\"></div>"
    +"<div class=\"r2\">"
    +"<div class=\"f\"><label>"+AR+"</label><input type=\"text\" class=\"sk\" placeholder=\""+APH+"\"></div>"
    +"<div class=\"f\"><label>"+RA+"</label><input type=\"text\" class=\"qt\" placeholder=\""+RPH+"\"></div>"
    +"</div>";
  g("items").appendChild(d);
}

function generate(){
  var fr=g("fr").value.trim(),to=g("to").value.trim();
  var car=g("car").value.trim(),drv=g("drv").value.trim(),rep=g("rep").value.trim();
  var typ=parseInt(g("ot").value)===0?SK:DZ;
  var co=g("co_s").textContent;
  var now=new Date();
  var ds=now.toLocaleDateString("ka-GE",{year:"numeric",month:"long",day:"numeric"});
  var ts=now.toLocaleTimeString("ka-GE",{hour:"2-digit",minute:"2-digit"});
  var sep="─────────────────────";
  var t=S+"\n"+co+"\n"+sep+"\n";
  t+="🗓 "+ds+" "+ts+"\n";
  t+="📂 "+typ+"\n";
  if(fr||to) t+="🏁 "+(fr||"-")+" ➡ "+(to||"-")+"\n";
  if(car) t+="🚚 "+car+"\n";
  if(drv) t+="👤 "+MG+drv+"\n";
  if(rep) t+="✅ "+GN+rep+"\n";
  var rows=g("items").getElementsByClassName("ib");
  var hasIt=false;
  for(var i=0;i<rows.length;i++){
    var nm=rows[i].getElementsByClassName("nm")[0].value.trim();
    var sk=rows[i].getElementsByClassName("sk")[0].value.trim();
    var qt=rows[i].getElementsByClassName("qt")[0].value.trim();
    if(nm){
      if(!hasIt){t+=sep+"\n";hasIt=true;}
      var l=(i+1)+". "+nm;
      if(sk) l+=" ["+sk+"]";
      if(qt) l+=" — "+qt;
      t+=l+"\n";
    }
  }
  g("otxt").textContent=t;
  g("oc").style.display="block";
  setTimeout(function(){g("oc").scrollIntoView({behavior:"smooth",block:"start"});},80);
}

function copyText(){
  var txt=g("otxt").textContent;
  function ok(){
    var t=g("toast");
    t.style.transform="translateX(-50%) translateY(0)";
    setTimeout(function(){t.style.transform="translateX(-50%) translateY(80px)";},2000);
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok).catch(function(){fb(txt,ok);});
  }else{fb(txt,ok);}
}

function fb(txt,cb){
  var ta=document.createElement("textarea");
  ta.value=txt;ta.style.cssText="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");if(cb)cb();}catch(e){}
  document.body.removeChild(ta);
}

function reset(){
  ["fr","to","car","drv","rep"].forEach(function(id){g(id).value="";});
  g("items").innerHTML="";ic=0;setType(0);
  g("oc").style.display="none";
  window.scrollTo({top:0,behavior:"smooth"});
  addItem();
}

document.addEventListener("click",function(e){
  var el=e.target;
  for(var i=0;i<4;i++){
    if(!el||el===document.body) break;
    var id=el.id,did=el.getAttribute?el.getAttribute("data-id"):null;
    if(id==="bS"){setType(0);return;}
    if(id==="bD"){setType(1);return;}
    if(id==="addBtn"){addItem();return;}
    if(id==="genBtn"){generate();return;}
    if(id==="copyBtn"){copyText();return;}
    if(id==="resetBtn"){reset();return;}
    if(did){var t=g(did);if(t)t.parentNode.removeChild(t);return;}
    el=el.parentNode;
  }
},true);

addItem();
})();</script>
